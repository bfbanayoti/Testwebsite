<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Banayoti — Mobile Preview</title>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  html, body {
    margin: 0;
    padding: 0;
    min-height: 100vh;
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%, rgba(99,102,241,0.10), transparent 60%),
      #03081a;
    font-family: "Geist", ui-sans-serif, system-ui, sans-serif;
    color: rgba(244,246,250,0.92);
    overflow-x: hidden;
  }
  .stage {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    padding: 40px 24px 60px;
  }
  .stage__header {
    text-align: center;
    max-width: 520px;
  }
  .stage__eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 6px 14px 6px 8px;
    border-radius: 999px;
    background: rgba(255,255,255,0.04);
    border: 0.5px solid rgba(255,255,255,0.12);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(244,246,250,0.85);
  }
  .stage__eyebrow-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: #fcd34d;
    box-shadow: 0 0 10px #fcd34d;
  }
  .stage__title {
    font-family: "Geist", sans-serif;
    font-weight: 500;
    font-size: 28px;
    letter-spacing: -0.02em;
    margin: 18px 0 6px;
  }
  .stage__sub {
    font-size: 14px;
    line-height: 1.55;
    color: rgba(244,246,250,0.6);
    margin: 0;
    font-weight: 300;
  }
  .stage__link {
    margin-top: 8px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: rgba(244,246,250,0.85);
    text-decoration: none;
    font-size: 13px;
    padding: 8px 14px;
    border-radius: 999px;
    background: rgba(255,255,255,0.05);
    border: 0.5px solid rgba(255,255,255,0.14);
  }
  .stage__link:hover { background: rgba(255,255,255,0.10); }

  .frame-shell {
    width: 100%;
    height: 100%;
    padding-top: 50px; /* clear the iPhone status bar overlay */
    box-sizing: border-box;
    background: #03081a;
  }
  .frame-iframe {
    width: 100%;
    height: 100%;
    border: 0;
    background: #03081a;
    display: block;
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel">
    function App() {
      return (
        <div className="stage">
          <div className="stage__header">
            <span className="stage__eyebrow">
              <span className="stage__eyebrow-dot"></span>
              Mobile preview
            </span>
            <h1 className="stage__title">Banayoti Consulting on iPhone</h1>
            <p className="stage__sub">
              Scroll inside the device to navigate the site. Tap the nav pill at the top
              to switch between Home, About, Services, and Portfolio.
            </p>
            <a href="index.html" className="stage__link">
              Open full desktop site
              <svg viewBox="0 0 14 14" fill="none" width="12" height="12">
                <path d="M4 10 10 4M5 4h5v5" stroke="currentColor" strokeWidth="1.3" strokeLinecap="round" />
              </svg>
            </a>
          </div>

          <IOSDevice width={402} height={874} dark={true}>
            <div className="frame-shell">
              <iframe
                className="frame-iframe"
                src="index.html"
                title="Banayoti Consulting mobile preview"
                loading="lazy"
              />
            </div>
          </IOSDevice>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
